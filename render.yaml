services:
  - type: web
    name: homeservice-server
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: 8080
      - key: ADMIN_INVITE_CODE
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 86400000
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_API_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: uploads
